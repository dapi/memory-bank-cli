name: Validate and release memory-bank-cli

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version tag to publish (for example v1.0.0)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Test
        run: go test -count=1 -race ./...
      - name: Vet
        run: go vet ./...
      - name: Validate GoReleaser configuration
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check
      - name: Build release snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --snapshot --clean
      - name: Validate release candidate with local E2E
        run: |
          set -euo pipefail
          candidate="$(find dist -path '*linux_amd64*' -type f -name memory-bank-cli -perm -u+x | head -n 1)"
          test -n "$candidate"
          E2E_BINARY="$candidate" E2E_SCOPE=release bash scripts/e2e-init-update.sh

  release:
    name: Publish release
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
      - name: Create or verify release tag
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          numeric_identifier='(0|[1-9][0-9]*)'
          prerelease_identifier="(${numeric_identifier}|[0-9A-Za-z-]*[A-Za-z-][0-9A-Za-z-]*)"
          semver_regex="^v${numeric_identifier}\\.${numeric_identifier}\\.${numeric_identifier}(-${prerelease_identifier}(\\.${prerelease_identifier})*)?(\\+[0-9A-Za-z-]+(\\.[0-9A-Za-z-]+)*)?$"
          if ! [[ "$RELEASE_VERSION" =~ $semver_regex ]]; then
            echo "release version must be a complete v-prefixed semantic version" >&2
            exit 1
          fi

          candidate_sha="$(git rev-parse HEAD)"
          existing_tag_sha="$(git ls-remote --tags origin "refs/tags/${RELEASE_VERSION}^{}" | awk '{print $1}')"
          if [ -n "$existing_tag_sha" ]; then
            if [ "$existing_tag_sha" != "$candidate_sha" ]; then
              echo "${RELEASE_VERSION} already points to a different commit" >&2
              exit 1
            fi
            echo "${RELEASE_VERSION} already tags the validated commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "$RELEASE_VERSION" --message "Release $RELEASE_VERSION" "$candidate_sha"
          git push origin "refs/tags/$RELEASE_VERSION"
      - name: Publish GitHub release
        uses: goreleaser/goreleaser-action@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
