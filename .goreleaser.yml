# GoReleaser configuration for the primary and compatibility binaries.
# https://goreleaser.com

version: 2

project_name: memory-bank

before:
  hooks:
    - go mod tidy

builds:
  - id: memory-bank
    main: ./cmd/memory-bank
    binary: memory-bank
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
      - windows_amd64

  - id: memory-bank-lint
    main: ./cmd/memory-bank-lint
    binary: memory-bank-lint
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
      - windows_amd64

archives:
  - id: memory-bank
    ids:
      - memory-bank
    formats:
      - binary
    name_template: "memory-bank-{{ .Os }}-{{ .Arch }}"

  - id: memory-bank-lint
    ids:
      - memory-bank-lint
    formats:
      - binary
    name_template: "memory-bank-lint-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs(\(.+\))?:'
      - '^test(\(.+\))?:'
      - '^chore(\(.+\))?:'
      - '^refactor(\(.+\))?:'
      - '(?i)typo'
  groups:
    - title: New Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance Improvements
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Documentation Updates
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 3
    - title: Other Changes
      order: 999

homebrew_casks:
  - name: memory-bank
    ids:
      - memory-bank
    binaries:
      - memory-bank
    repository:
      owner: dapi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/dapi/memory-bank
    description: Extensible CLI for Memory Bank documentation tooling

  - name: memory-bank-lint
    ids:
      - memory-bank-lint
    binaries:
      - memory-bank-lint
    repository:
      owner: dapi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/dapi/memory-bank
    description: Audit navigation integrity for memory-bank documentation

release:
  github:
    owner: dapi
    name: memory-bank
  prerelease: auto
  mode: append
  footer: |
    ## Installation

    ### Homebrew
    ```bash
    brew install dapi/tap/memory-bank
    ```

    ### macOS (Apple Silicon)
    ```bash
    curl -L -o memory-bank https://github.com/dapi/memory-bank/releases/download/{{ .Tag }}/memory-bank-darwin-arm64
    chmod +x memory-bank
    sudo mv memory-bank /usr/local/bin/
    ```

    ### macOS (Intel)
    ```bash
    curl -L -o memory-bank https://github.com/dapi/memory-bank/releases/download/{{ .Tag }}/memory-bank-darwin-amd64
    chmod +x memory-bank
    sudo mv memory-bank /usr/local/bin/
    ```

    ### Linux (amd64)
    ```bash
    curl -L -o memory-bank https://github.com/dapi/memory-bank/releases/download/{{ .Tag }}/memory-bank-linux-amd64
    chmod +x memory-bank
    sudo mv memory-bank /usr/local/bin/
    ```

    ### Windows
    Download `memory-bank-windows-amd64.exe` from the assets below and add it to `PATH`.

    The release also contains `memory-bank-lint-*` compatibility binaries for existing automation.

    **Full Changelog**: https://github.com/dapi/memory-bank/compare/{{ .PreviousTag }}...{{ .Tag }}
